      EUREKA_INSTANCE_HOSTNAME: apigateway
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      eureka:
        condition: service_healthy
      auth:
        condition: service_started
      ms-book:
        condition: service_started
      ms-loan:
        condition: service_started
      ms-customer:
        condition: service_started
      bff:
        condition: service_started
    networks:
