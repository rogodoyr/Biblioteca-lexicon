# Orquesta los 6 servicios en una red interna de Docker.
# Solo Eureka (8761) y API Gateway (8080) exponen puertos al host.

services:
  eureka:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: eureka
    container_name: eureka
    ports:
      - "8761:8761"
    networks:
      - microservices
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8761'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: auth
    container_name: auth
    environment:
      "eureka.client.serviceUrl.defaultZone": http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: auth
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - microservices

  ms-book:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: ms-book
    container_name: ms-book
    environment:
      "eureka.client.serviceUrl.defaultZone": http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: ms-book
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - microservices

  ms-loan:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: ms-loan
    container_name: ms-loan
    environment:
      "eureka.client.serviceUrl.defaultZone": http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: ms-loan
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - microservices

  ms-customer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: ms-customer
    container_name: ms-customer
    environment:
      "eureka.client.serviceUrl.defaultZone": http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: ms-customer
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - microservices

  bff:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: bff
    container_name: bff
    environment:
      "eureka.client.serviceUrl.defaultZone": http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: bff
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - microservices

  apigateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: apigateway
    container_name: apigateway
    ports:
      - "8080:8080"
    environment:
      "eureka.client.serviceUrl.defaultZone": http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: apigateway
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      eureka:
        condition: service_healthy
      auth:
        condition: service_started
      ms-book:
        condition: service_started
      ms-loan:
        condition: service_started
      ms-customer:
        condition: service_started
      bff:
        condition: service_started
    networks:
      - microservices

networks:
  microservices:
    driver: bridge