# Orquesta todos los servicios en una red interna de Docker.
# Cada servicio expone su puerto para Swagger UI directamente.

services:
  eureka:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: eureka
    container_name: eureka
    ports:
      - "8761:8761"
    networks:
      - microservices
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8761'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: auth
    container_name: auth
    ports:
      - "8081:8081"
    environment:
      "eureka.client.serviceUrl.defaultZone": http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: auth
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - microservices

  ms-book:
