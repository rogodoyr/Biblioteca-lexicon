spring.application.name=auth

# Auth service port.
server.port=8081

# H2 in-memory database for local dev (auto-replaced by Postgres in production via env vars).
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway migrations.
spring.flyway.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.flyway.user=sa
spring.flyway.password=
spring.flyway.locations=classpath:db/migration

# Register auth in Eureka so gateway can use lb://auth.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
# Faster heartbeat in dev to reduce startup waiting windows.
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15

# Demo JWT settings used by /login to issue signed tokens.
jwt.secret=ChangeThisSecretForDemoOnlyChangeThisSecret12345
jwt.expiration-minutes=120

# GlitchTip (Sentry-compatible)
sentry.dsn=${SENTRY_DSN:}
sentry.release=${SENTRY_RELEASE:0.0.1-SNAPSHOT}
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.1}
sentry.send-default-pii=false
sentry.logs.enabled=true
sentry.logging.minimum-level=info
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=debug
sentry.exception-resolver-order=-2147483647
sentry.logging.context-tags=requestId
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [requestId=%X{requestId}] %-5level %logger{36} - %msg%n

# Springdoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.packages-to-scan=com.lexicon.auth.controller

