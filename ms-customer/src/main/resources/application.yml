server:
  port: 8084

spring:
  application:
    name: ms-customer
  datasource:
    url: jdbc:h2:mem:customerdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG

# GlitchTip (Sentry-compatible)
sentry:
  dsn: ${SENTRY_DSN:}
  release: ${SENTRY_RELEASE:0.0.1-SNAPSHOT}
  environment: ${SENTRY_ENVIRONMENT:development}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  send-default-pii: false
  logs:
    enabled: true
  logging:
    minimum-level: info
    minimum-event-level: error
    minimum-breadcrumb-level: debug
    context-tags: requestId
  exception-resolver-order: -2147483647

# Springdoc / Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  packages-to-scan: com.lexicon.customer.controller
